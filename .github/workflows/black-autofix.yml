name: Black Auto Formatter

on:
  push:
    branches:
      - '**'
    paths:
      - '**.py'
  workflow_dispatch:  # 👈 enables manual run from GitHub UI

jobs:
  black-autofix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Black
        run: |
          python -m pip install --upgrade pip
          pip install black

      - name: Run Black and auto-format
        run: |
          black .

      - name: Commit changes
        run: |
          if [[ `git status --porcelain` ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "style: auto-format Python code with Black"
            git push
          fi
